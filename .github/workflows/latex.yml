name: Build LaTeX PDF

on:
  workflow_dispatch:
    inputs:
      root_file:
        description: "Path to the main .tex file to compile (relative to repo root)"
        required: true
        default: "paper/notes/tech/tech_building_blocks.tex"

jobs:
  build-latex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: ${{ inputs.root_file }}

      - name: Compute PDF path
        shell: bash
        run: |
          pdf="${{ inputs.root_file }}"
          pdf="${pdf%.tex}.pdf"
          echo "PDF_PATH=$pdf" >> "$GITHUB_ENV"
          echo "Will upload: $pdf"

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: latex-pdf
          path: ${{ env.PDF_PATH }}
