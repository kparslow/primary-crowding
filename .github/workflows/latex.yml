name: Build LaTeX PDF

"on":
  workflow_dispatch:
    inputs:
      root_file:
        description: Path to the main .tex file to compile (relative to repo root)
        required: true
        default: paper/notes/tech/tech_building_blocks.tex

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-latex:
    runs-on: ubuntu-latest
    env:
      ROOT_FILE: ${{ inputs.root_file }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: ${{ inputs.root_file }}
          args: -halt-on-error -file-line-error
          
      - name: Debug: show TeX outputs
        if: always()
        shell: bash
        run: | 
        echo "List tech dir:"
        ls -la paper/notes/tech || true
        echo "Find any PDFs anywhere:"
        find . -type f -name "*.pdf" -print || true
        echo "Find LaTeX logs:"
        find . -type f \( -name "*.log" -o -name "*.fls" -o -name "*.aux" \) -maxdepth 6 -print || true

      - name: Compute PDF path
        shell: bash
        run: |
          pdf="${ROOT_FILE%.tex}.pdf"
          echo "PDF_PATH=$pdf" >> "$GITHUB_ENV"

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: latex-pdf
          path: ${{ env.PDF_PATH }}
